[variables]
NODE_ENV = "production"
NEXT_TELEMETRY_DISABLED = "1"
PORT = "3000"
HOSTNAME = "0.0.0.0"

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = [
  "npm run build",
  "cp -r src/db/migrations migrations",
  "cp -r .next/static .next/standalone/.next/static",
  "cp -r public .next/standalone/public",
]

[start]
cmd = "cd .next/standalone && node /app/migrate.mjs && node server.js"
