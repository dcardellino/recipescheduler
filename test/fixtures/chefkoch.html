<script type="application/ld+json">
{
  "@context": "http://schema.org",
  "@type": "Recipe",
  "name": "Klassische Spaghetti Bolognese",
  "description": "Klassische Bolognese mit gemischtem Hackfleisch.",
  "image": {
    "@type": "ImageObject",
    "url": "https://img.chefkoch-cdn.de/rezepte/spaghetti-bolognese.jpg"
  },
  "author": { "@type": "Person", "name": "Chefkoch User" },
  "datePublished": "2009-08-02",
  "prepTime": "PT20M",
  "cookTime": "PT40M",
  "totalTime": "PT60M",
  "recipeYield": "4 Portionen",
  "recipeCategory": "Pasta",
  "recipeCuisine": "Italienisch",
  "keywords": "Pasta, Italienisch, Fleisch, Hauptgericht",
  "recipeIngredient": [
    "500 g Spaghetti",
    "400 g Rinderhackfleisch",
    "2 Zwiebeln",
    "2 Knoblauchzehen",
    "2 EL Olivenöl",
    "800 g passierte Tomaten",
    "2 EL Tomatenmark",
    "200 ml Rotwein",
    "1 TL Salz",
    "1 Prise schwarzer Pfeffer",
    "frischer Basilikum"
  ],
  "recipeInstructions": [
    { "@type": "HowToStep", "text": "Zwiebeln und Knoblauch fein hacken." },
    { "@type": "HowToStep", "text": "Olivenöl in einer Pfanne erhitzen, Zwiebeln glasig dünsten, Knoblauch zugeben." },
    { "@type": "HowToStep", "text": "Hackfleisch zugeben und krümelig anbraten." },
    { "@type": "HowToStep", "text": "Tomatenmark kurz mitrösten, dann mit Rotwein ablöschen und einkochen lassen." },
    { "@type": "HowToStep", "text": "Passierte Tomaten zugeben, 30-40 Minuten köcheln lassen und mit Salz und Pfeffer abschmecken." },
    { "@type": "HowToStep", "text": "Inzwischen die Spaghetti in Salzwasser al dente kochen und mit der Sauce servieren." }
  ]
}

<h1>Klassische Spaghetti Bolognese</h1>
